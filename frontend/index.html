<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISCAM 1.0 - Acesso ao Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        centaurea: {
                            DEFAULT: '#4f46e5', // Azul Indigo Moderno sincronizado com o painel
                            hover: '#4338ca'
                        },
                        clarencia: {
                            bg: '#f8fafc',
                            card: '#ffffff',
                            text: '#334155', // Grafite para excelente leitura
                            sub: '#64748b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-clarencia-bg text-clarencia-text font-sans h-screen flex items-center justify-center overflow-hidden">

    <div class="w-full h-full flex flex-col md:flex-row bg-white">
        
        <!-- COLUNA DA ESQUERDA: FORMULÁRIO DE LOGIN -->
        <div class="w-full md:w-[45%] flex flex-col justify-between p-8 md:p-16 h-full z-10 bg-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-50 border border-indigo-100 rounded-xl flex items-center justify-center text-centaurea shadow-sm">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-wide text-slate-900 leading-none">SISCAM 1.0</h1>
                    <span class="text-[10px] text-centaurea font-bold uppercase tracking-widest block mt-0.5">Plenário Virtual Protegido</span>
                </div>
            </div>

            <div class="max-w-md w-full mx-auto my-auto space-y-6">
                <div class="space-y-1">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Portal Legislativo</h2>
                    <p class="text-sm text-clarencia-sub">Insira suas credenciais institucionais para acessar o terminal operacional.</p>
                </div>

                <form onsubmit="executarLogin(event)" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-clarencia-sub">Usuário de Acesso</label>
                        <div class="relative flex items-center">
                            <i data-lucide="user" class="absolute left-4 w-4 h-4 text-clarencia-sub"></i>
                            <input type="text" id="login-username" placeholder="Ex: nome.vereador" required class="w-full bg-slate-50 border border-slate-200 focus:border-centaurea focus:bg-white rounded-xl pl-11 pr-4 py-3 text-sm transition-all focus:outline-none text-slate-900 font-medium">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-bold uppercase tracking-wider text-clarencia-sub">Senha Eletrônica</label>
                        <div class="relative flex items-center">
                            <i data-lucide="lock" class="absolute left-4 w-4 h-4 text-clarencia-sub"></i>
                            <input type="password" id="login-senha" placeholder="••••••••••••" required class="w-full bg-slate-50 border border-slate-200 focus:border-centaurea focus:bg-white rounded-xl pl-11 pr-4 py-3 text-sm transition-all focus:outline-none text-slate-900 font-mono">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-centaurea hover:bg-centaurea-hover text-white font-bold py-3.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/10 text-sm tracking-wide mt-2">
                        <i data-lucide="log-in" class="w-4 h-4"></i> Autenticar no Terminal
                    </button>
                </form>
            </div>

            <div class="text-center md:text-left text-[11px] text-clarencia-sub font-mono">
                &copy; 2026 SISCAM - Todos os direitos reservados.
            </div>
        </div>

        // ROTA DE LOGON INTELIGENTE AUTOMÁTICA
        const BACKEND_RAILWAY = 'https://camaradevereadores-production.up.railway.app';
        const LOCAL_HOST = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_LOGIN_URL = LOCAL_HOST ? 'http://localhost:3000/api/vereadores/login' : `${BACKEND_RAILWAY}/api/vereadores/login`;

        async function executarLogin(event) {
            event.preventDefault();
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-senha').value;

            try {
                const res = await fetch(API_LOGIN_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    const dados = await res.json();
                    
                    // Salva a sessão no LocalStorage
                    localStorage.setItem('siscam_user_id', dados.id);
                    localStorage.setItem('siscam_user_nome', dados.nomeCompleto || dados.nomeEleitoral);
                    localStorage.setItem('siscam_user_nome_urna', dados.nomeEleitoral);
                    localStorage.setItem('siscam_user_nome_completo', dados.nomeCompleto);
                    localStorage.setItem('siscam_user_cargo', dados.cargo);
                    localStorage.setItem('siscam_user_partido', dados.sigla || dados.partido);
                    localStorage.setItem('siscam_user_foto', dados.foto || '');

                    // Redirecionamento dinâmico baseado no cargo cadastrado
                    if (dados.cargo === 'SUPERADMIN') {
                        window.location.href = './admin.html';
                    } else if (dados.cargo === 'PRESIDENTE') {
                        window.location.href = './presidente.html';
                    } else {
                        window.location.href = './vereador.html';
                    }
                } else {
                    alert("Usuário ou senha inválidos. Verifique suas credenciais.");
                }
            } catch (e) {
                alert("Erro ao conectar com o servidor do SISCAM.");
            }
        }
    </script>
</body>
