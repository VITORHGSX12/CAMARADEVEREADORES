<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISCAM 1.0 - Telão do Plenário em Alta Definição</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen w-screen flex flex-col overflow-hidden p-6 gap-6 transition-all duration-300">

    <!-- TOPBAR DA TELEVISÃO -->
    <header class="bg-slate-900/90 border border-slate-800 rounded-2xl px-8 py-4 flex items-center justify-between shadow-xl backdrop-blur-md shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="gavel" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-wide text-white">CÂMARA MUNICIPAL DE GONÇALVES DIAS</h1>
                <p id="pauta-telao-sub" class="text-xs text-amber-400 font-bold uppercase tracking-widest">Sessão Plenária Ordinária — Painel de Cédulas Dinâmico</p>
            </div>
        </div>
        
        <!-- BOTÕES DE CONTROLE (MODERAÇÃO E EXPANSÃO) -->
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-slate-950/60 border border-slate-800 p-1.5 rounded-xl">
                <button onclick="alternarMuteSeguranca()" id="btn-mute-seguranca" class="bg-slate-800 hover:bg-rose-600/20 text-slate-300 hover:text-rose-400 p-2 rounded-lg border border-slate-700 hover:border-rose-500/30 transition-all flex items-center gap-2 font-bold text-xs shadow">
                    <i data-lucide="volume-2" id="icone-mute-seguranca" class="w-4 h-4"></i>
                    <span id="txt-mute-seguranca">Áudio Ativo</span>
                </button>
                <button onclick="alternarTelaCheia()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 p-2 rounded-lg border border-slate-700 transition-all flex items-center justify-center">
                    <i data-lucide="maximize" id="icone-fullscreen" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="text-right border-l border-slate-800 pl-4 font-mono">
                <span class="text-xs text-slate-400 block font-medium">Horário Local</span>
                <span id="relogio-sessao" class="text-lg font-mono font-black text-white tracking-wider">00:00:00</span>
            </div>
        </div>
    </header>

    <!-- NOVO: BANNER DE DESTAQUE DO ORADOR ATIVO E CRONÔMETRO DE TRIBUNA -->
    <div id="banner-orador-ativo" class="bg-gradient-to-r from-blue-950/80 via-slate-900/90 to-blue-950/80 border border-blue-500/30 p-4 rounded-2xl flex items-center justify-between shadow-2xl hidden animate-in fade-in slide-in-from-top-4 duration-300">
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 rounded-full bg-red-500 animate-ping"></div>
            <div>
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest block">Palavra Solene na Tribuna</span>
                <h2 id="txt-nome-orador" class="text-xl font-black text-white tracking-wide">VEREADOR NOME</h2>
                <p id="txt-partido-orador" class="text-xs text-slate-400 font-medium">Partido - SIGLA</p>
            </div>
        </div>
        <div class="bg-slate-950/80 border border-slate-800 px-6 py-2 rounded-xl flex items-center gap-3 shadow-inner font-mono">
            <i data-lucide="timer" class="w-5 h-5 text-amber-400 animate-spin-slow"></i>
            <div>
                <span class="text-[9px] text-slate-500 block uppercase font-bold leading-none">Tempo Restante</span>
                <span id="cronometro-orador" class="text-2xl font-black text-amber-400 tracking-widest">05:00</span>
            </div>
        </div>
    </div>

    <!-- GRID DOS VEREADORES ESTILO MEET -->
    <main id="meet-grid" class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-4 overflow-hidden"></main>

    <!-- FOOTER DA TRANSMISSÃO -->
    <footer class="bg-slate-900/40 border border-slate-800 rounded-xl px-6 py-3 flex items-center justify-between text-xs text-slate-500 shrink-0">
        <div>SISCAM 1.0 • Sistema de Transmissão de Áudio e Presença Conectado</div>
        <div class="flex items-center gap-2 text-emerald-400 font-bold uppercase tracking-wider text-[11px]">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Sincronização de Áudio Geral Ativa
        </div>
    </footer>

    <script>
        lucide.createIcons();
        
        setInterval(() => {
            document.getElementById('relogio-sessao').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        const socket = io('http://localhost:3000');
        const grid = document.getElementById('meet-grid');
        
        let audioMutadoPorSeguranca = false;
        let ultimoOradorId = null;
        let tempoSegundos = 300; 
        let intervaloCronometro = null;

        socket.on('receberAudioStream', (dadosAudio) => {
            if (audioMutadoPorSeguranca) return;
            const audioBlob = new Blob([new Uint8Array(dadosAudio.buffer)], { type: 'audio/webm; codecs=opus' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play().catch(e => console.log("Interação pendente."));
        });

        function alternarMuteSeguranca() {
            const btn = document.getElementById('btn-mute-seguranca');
            const icone = document.getElementById('icone-mute-seguranca');
            const txt = document.getElementById('txt-mute-seguranca');
            audioMutadoPorSeguranca = !audioMutadoPorSeguranca;

            if (audioMutadoPorSeguranca) {
                btn.className = "bg-rose-600 hover:bg-rose-500 text-white p-2 rounded-lg border border-rose-500 transition-all flex items-center gap-2 font-bold text-xs shadow-lg animate-pulse";
                icone.setAttribute('data-lucide', 'volume-x');
                txt.innerText = "ÁUDIO CORTADO";
            } else {
                btn.className = "bg-slate-800 hover:bg-rose-600/20 text-slate-300 hover:text-rose-400 p-2 rounded-lg border border-slate-700 hover:border-rose-500/30 transition-all flex items-center gap-2 font-bold text-xs shadow";
                icone.setAttribute('data-lucide', 'volume-2');
                txt.innerText = "Áudio Ativo";
            }
            lucide.createIcons();
        }

        function alternarTelaCheia() {
            const icone = document.getElementById('icone-fullscreen');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    icone.setAttribute('data-lucide', 'minimize');
                    lucide.createIcons();
                }).catch(err => console.log(err));
            } else {
                document.exitFullscreen().then(() => {
                    icone.setAttribute('data-lucide', 'maximize');
                    lucide.createIcons();
                });
            }
        }

        // GERENCIADOR REATIVO DO CRONÔMETRO INTERNO DO TELÃO
        function gerenciarCronometroOrador(oradorId) {
            if (!oradorId) {
                clearInterval(intervaloCronometro);
                intervaloCronometro = null;
                ultimoOradorId = null;
                document.getElementById('banner-orador-ativo').classList.add('hidden');
                return;
            }

            // Se o orador mudou, reseta o tempo para 5 minutos normatizados
            if (oradorId !== ultimoOradorId) {
                clearInterval(intervaloCronometro);
                ultimoOradorId = oradorId;
                tempoSegundos = 300; 
                
                intervaloCronometro = setInterval(() => {
                    if (tempoSegundos <= 0) {
                        clearInterval(intervaloCronometro);
                        document.getElementById('cronometro-orador').innerText = "00:00";
                        return;
                    }
                    tempoSegundos--;
                    const min = String(Math.floor(tempoSegundos / 60)).padStart(2, '0');
                    const seg = String(tempoSegundos % 60).padStart(2, '0');
                    document.getElementById('cronometro-orador').innerText = `${min}:${seg}`;
                }, 1000);
            }
        }

        async function carregarDadosTelao() {
            try {
                const resposta = await fetch('http://localhost:3000/api/sessao/status');
                const status = await resposta.json();
                
                if (status.sessaoAtiva && status.materiaAtual.codigo) {
                    document.getElementById('pauta-telao-sub').innerText = `ORDEM DO DAY EM VOTAÇÃO: ${status.materiaAtual.codigo} — ${status.materiaAtual.ementa}`;
                } else {
                    document.getElementById('pauta-telao-sub').innerText = `SESSÃO PLENÁRIA ORDINÁRIA — AGUARDANDO MATÉRIA OU LEITURA`;
                }

                // Dispara o controle do cronômetro baseado no microfone ativo
                gerenciarCronometroOrador(status.microfoneAutorizadoId);
                renderizarGridMeet(status.vereadores, status.microfoneAutorizadoId);
            } catch(e) { console.error(e); }
        }

        function renderizarGridMeet(vereadores, microfoneAutorizadoId) {
            grid.innerHTML = '';
            if(!vereadores || vereadores.length === 0) {
                grid.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center text-slate-600 font-medium text-sm border-2 border-dashed border-slate-800 rounded-2xl"><p>Nenhum parlamentar em plenário.</p></div>`;
                return;
            }

            vereadores.forEach(p => {
                const card = document.createElement('div');
                const estaComAPalavra = microfoneAutorizadoId && String(p.id) === String(microfoneAutorizadoId);

                // Configura as informações do Banner de Destaque superior caso este seja o orador
                if (estaComAPalavra) {
                    document.getElementById('banner-orador-ativo').classList.remove('hidden');
                    document.getElementById('txt-nome-orador').innerText = p.nomeEleitoral.toUpperCase();
                    document.getElementById('txt-partido-orador').innerText = `${p.partido || 'Sem Partido'} — ${p.sigla}`;
                }
                
                let estiloCardVoto = "bg-slate-900 border-slate-800/80 from-slate-900 to-slate-950 text-slate-100"; 
                let badgeVotoText = `<span class="text-slate-400 font-mono text-[10px] font-bold uppercase">Aguardando</span>`;

                if (p.voto === 'SIM') {
                    estiloCardVoto = "bg-emerald-950/80 border-emerald-500/60 from-emerald-900/40 to-slate-950 shadow-emerald-950/40 border-2 animate-[pulse_2s_infinite]";
                    badgeVotoText = `<span class="text-emerald-400 font-mono text-[10px] font-black uppercase tracking-wider">● Votou SIM</span>`;
                } else if (p.voto === 'NÃO') {
                    estiloCardVoto = "bg-rose-950/80 border-rose-500/60 from-rose-900/40 to-slate-950 shadow-rose-950/40 border-2";
                    badgeVotoText = `<span class="text-rose-400 font-mono text-[10px] font-black uppercase tracking-wider">● Votou NÃO</span>`;
                } else if (p.voto === 'ABSTENÇÃO') {
                    estiloCardVoto = "bg-amber-950/80 border-amber-500/60 from-amber-900/40 to-slate-950 shadow-amber-950/40 border-2";
                    badgeVotoText = `<span class="text-amber-400 font-mono text-[10px] font-black uppercase tracking-wider">● Abstenção</span>`;
                }

                // 🌟 INTEGRAÇÃO DO AJUSTE DE DESTAQUE E DESFOQUE (BLUR) 🌟
                let estiloImagemDestaque = "border-slate-950 scale-100 opacity-90 blur-0 transition-all duration-500";
                
                if (microfoneAutorizadoId) { // Se alguém está discursando no plenário
                    if (estaComAPalavra) {
                        // O ORADOR ATIVO GANHA DESTAQUE TOTAL (Borda Branca, Efeito Glow e Zoom na Imagem)
                        estiloCardVoto = "bg-slate-900 border-white/90 from-slate-800 to-slate-950 shadow-2xl shadow-white/10 border-2 scale-[1.02] z-10";
                        estiloImagemDestaque = "border-white/40 scale-110 opacity-100 shadow-xl blur-0";
                        badgeVotoText = `<span class="text-white font-mono text-[10px] font-black uppercase tracking-wider flex items-center gap-1"><i data-lucide="mic" class="w-3 h-3 text-white animate-bounce"></i> Em Tribuna</span>`;
                    } else {
                        // QUEM ESTÁ EM ESPERA FICA UM POUCO DESFOCADO (BLUR) E COM MENOS OPACIDADE
                        estiloCardVoto += " opacity-40 scale-95 pointer-events-none";
                        estiloImagemDestaque = "border-slate-950 opacity-40 blur-[3px]";
                    }
                }

                card.className = `relative rounded-2xl overflow-hidden shadow-2xl flex flex-col justify-between p-4 transition-all duration-500 bg-gradient-to-b ${estiloCardVoto}`;
                
                card.innerHTML = `
                    <div class="absolute top-3 right-3 bg-slate-950/80 px-2.5 py-1 border border-slate-800 rounded-lg backdrop-blur shadow">
                        ${badgeVotoText}
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center pt-4">
                        <div class="w-24 h-24 rounded-full border-4 overflow-hidden bg-slate-950 shadow-2xl relative ${estiloImagemDestaque}">
                            <img src="${p.foto}" alt="${p.nomeEleitoral}" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="bg-slate-950/90 border border-slate-800/60 p-3 rounded-xl flex items-center justify-between backdrop-blur-md mt-2">
                        <div class="truncate mr-2">
                            <!-- NOME DESTACADO DO VEREADOR E PARTIDO -->
                            <h3 class="font-extrabold text-sm text-white tracking-wide truncate ${estaComAPalavra ? 'text-amber-400 font-black' : ''}">${p.nomeEleitoral}</h3>
                            <span class="text-[9px] text-slate-400 font-bold block truncate uppercase">${p.partido || 'MUNICIPAL'}</span>
                        </div>
                        <div class="bg-slate-900 border border-slate-700/80 px-2.5 py-1 rounded-lg text-center font-mono font-black text-xs text-blue-400 tracking-wider shadow-inner shrink-0">
                            ${p.sigla}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        socket.on('atualizarPainel', () => carregarDadosTelao());
        carregarDadosTelao();
    </script>
</body>
</html>
